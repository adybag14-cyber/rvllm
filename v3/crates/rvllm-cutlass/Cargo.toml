[package]
name = "rvllm-cutlass"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true

# rvllm-cutlass: FP8 GEMM variant catalog, autotune policy, workspace contract.
# See v3/specs/11-cutlass-fp8.md. Variant table is generated by build.rs from
# one source (Rust + CUDA tables sync). static_assert in CUDA on schedule pairs.

[dependencies]
rvllm-core = { workspace = true }
rvllm-mem = { workspace = true }
rvllm-kernels = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

[build-dependencies]
# build.rs will generate variants.rs and kernels/cutlass_variants.inc from
# a shared variants.toml. Keeps Rust + CUDA catalogs in sync.
